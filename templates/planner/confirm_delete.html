{% extends "base.html" %}
{% block title %}Confirm Delete — Vacation Planner{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 480px;">
  <div class="card border-danger">
    <div class="card-header bg-danger text-white">
      <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Confirm Delete</h5>
    </div>
    <div class="card-body">
      <p class="mb-4">
        Are you sure you want to permanently delete <strong>{{ item_name }}</strong>?
        This cannot be undone.
      </p>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i>Delete
          </button>
          <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
