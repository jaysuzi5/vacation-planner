{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>Offline — Vacation Planner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{% static 'css/site.css' %}?v=7">
  <script>
    (function() {
      var stored = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-bs-theme', stored);
    })();
  </script>
</head>
<body>
<div class="container py-5 text-center" style="max-width:540px;">
  <i class="bi bi-wifi-off display-1 text-muted"></i>
  <h2 class="mt-3">You're offline</h2>
  <p class="text-muted mb-4">No internet connection. Pages you've viewed or saved are available below.</p>

  <div id="cached-trips" class="text-start mb-4"></div>

  <button onclick="location.reload()" class="btn btn-primary">
    <i class="bi bi-arrow-clockwise me-1"></i>Try again
  </button>
</div>

<script>
(function () {
  var CACHE = 'vp-shell-v2';
  var container = document.getElementById('cached-trips');

  if (!('caches' in window)) {
    container.innerHTML = '<p class="text-muted fst-italic small">Cache API not available in this browser.</p>';
    return;
  }

  caches.open(CACHE).then(function (cache) {
    return cache.keys();
  }).then(function (requests) {
    var trips = requests
      .map(function (r) { return new URL(r.url).pathname; })
      .filter(function (p) { return /^\/vacations\/\d+\/$/.test(p); });

    if (trips.length === 0) {
      container.innerHTML =
        '<div class="alert alert-info">' +
        '<i class="bi bi-info-circle me-2"></i>' +
        'No trips saved for offline yet. Visit a trip detail page while online, then tap <strong>Save Offline</strong>.' +
        '</div>';
      return;
    }

    var html = '<h6 class="text-muted text-uppercase small mb-2">Saved trips</h6><div class="list-group">';
    trips.forEach(function (path) {
      html += '<a href="' + path + '" class="list-group-item list-group-item-action">' +
              '<i class="bi bi-map me-2 text-primary"></i>' + path + '</a>';
    });
    html += '</div>';
    container.innerHTML = html;
  }).catch(function () {
    container.innerHTML = '<p class="text-muted fst-italic small">Could not read offline cache.</p>';
  });
})();
</script>
</body>
</html>
