---
apiVersion: v1
kind: Namespace
metadata:
  name: vacation-planner

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vacation-planner
  namespace: vacation-planner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vacation-planner
  template:
    metadata:
      labels:
        app: vacation-planner
    spec:
      initContainers:
        - name: migrate
          image: jaysuzi5/vacation-planner:latest
          command: ["uv", "run", "python", "manage.py", "migrate", "--no-input"]
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "config.settings"
            - name: DJANGO_ENV
              value: "production"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: vacation-planner
                  key: secret_key
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: vacation-planner
                  key: postgres_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vacation-planner
                  key: postgres_password
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgresql-rw.postgresql.svc.cluster.local:5432/vacation_planner"
            - name: ALLOWED_HOSTS
              value: "vacations.jaycurtis.org"
            - name: CSRF_TRUSTED_ORIGINS
              value: "https://vacations.jaycurtis.org"
      containers:
        - name: vacation-planner
          image: jaysuzi5/vacation-planner:latest
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "config.settings"
            - name: DJANGO_ENV
              value: "production"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: vacation-planner
                  key: secret_key
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: vacation-planner
                  key: postgres_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vacation-planner
                  key: postgres_password
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgresql-rw.postgresql.svc.cluster.local:5432/vacation_planner"
            - name: ALLOWED_HOSTS
              value: "vacations.jaycurtis.org"
            - name: CSRF_TRUSTED_ORIGINS
              value: "https://vacations.jaycurtis.org"
            - name: EMAIL_HOST_USER
              valueFrom:
                secretKeyRef:
                  name: vacation-planner
                  key: email_user
                  optional: true
            - name: EMAIL_HOST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vacation-planner
                  key: email_password
                  optional: true
            - name: OTEL_SERVICE_NAME
              value: "vacation-planner"
            - name: OTLP_ENDPOINT
              value: "http://otel-collector-collector.monitoring.svc.cluster.local:4318"

---
apiVersion: v1
kind: Service
metadata:
  name: vacation-planner
  namespace: vacation-planner
spec:
  type: LoadBalancer
  selector:
    app: vacation-planner
  ports:
    - port: 80
      targetPort: 8000
